# Deploys firestore.rules to the Firebase project whenever the rules change
# on main (or when run manually from the Actions tab).
#
# One-time setup:
# 1. Google Cloud console -> IAM & Admin -> Service accounts (project
#    "instructoros") -> Create service account (e.g. "rules-deployer") with
#    ONLY the "Firebase Rules Admin" role, then create a JSON key for it.
# 2. GitHub repo -> Settings -> Secrets and variables -> Actions -> new
#    repository secret named FIREBASE_SERVICE_ACCOUNT containing the full
#    JSON key file contents.
# 3. Actions tab -> "Deploy Firestore rules" -> Run workflow (first deploy).
#
# The key can only update security rules — it cannot read or write app data.

name: Deploy Firestore rules

on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - .github/workflows/deploy-rules.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check for service account secret
        id: check
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is not set — skipping deploy."
            echo "Add it in Settings > Secrets and variables > Actions (see comments in this workflow file)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.configured == 'true'
        with:
          node-version: 20

      - name: Deploy rules
        if: steps.check.outputs.configured == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/firebase-sa.json" --project instructoros
          access_token="$(gcloud auth print-access-token)"
          jq --rawfile rules firestore.rules '{source:{files:[{name:"firestore.rules",content:$rules}]}}' > "$RUNNER_TEMP/ruleset-payload.json"
          ruleset_status="$(curl --silent --show-error --output "$RUNNER_TEMP/ruleset-response.json" --write-out '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/json" \
            --data-binary @"$RUNNER_TEMP/ruleset-payload.json" \
            "https://firebaserules.googleapis.com/v1/projects/instructoros/rulesets")"
          cat "$RUNNER_TEMP/ruleset-response.json"
          test "$ruleset_status" = "200"
          ruleset_name="$(jq -r '.name' "$RUNNER_TEMP/ruleset-response.json")"
          test -n "$ruleset_name" && test "$ruleset_name" != "null"
          releases_status="$(curl --silent --show-error --output "$RUNNER_TEMP/releases-response.json" --write-out '%{http_code}' \
            -H "Authorization: Bearer $access_token" \
            "https://firebaserules.googleapis.com/v1/projects/instructoros/releases")"
          cat "$RUNNER_TEMP/releases-response.json"
          test "$releases_status" = "200"
          releases_json="$(cat "$RUNNER_TEMP/releases-response.json")"
          release_name="$(printf '%s' "$releases_json" | jq -r '
            [.releases[]?.name | select(test("/releases/cloud\\.firestore(/|$)"))][0] // empty')"
          test -n "$release_name"
          echo "Updating Firestore release: $release_name"
          jq -n --arg ruleset_name "$ruleset_name" \
            --arg release_name "$release_name" \
            '{release:{name:$release_name,rulesetName:$ruleset_name},updateMask:"rulesetName"}' \
            > "$RUNNER_TEMP/release-payload.json"
          http_status="$(curl --silent --show-error --output "$RUNNER_TEMP/release-response.json" --write-out '%{http_code}' \
            -X PATCH \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/json" \
            --data-binary @"$RUNNER_TEMP/release-payload.json" \
            "https://firebaserules.googleapis.com/v1/$release_name?updateMask=rulesetName")"
          cat "$RUNNER_TEMP/release-response.json"
          test "$http_status" = "200"
